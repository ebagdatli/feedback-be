spring:
  application:
    name: feedback-hub

  datasource:
    url: jdbc:postgresql://localhost:5432/feedback_hub
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  threads:
    virtual:
      enabled: true

server:
  port: 8080

gemini:
  api-key: ${GEMINI_API_KEY:-}
  model: gemini-2.5-flash
  api-url: https://generativelanguage.googleapis.com/v1beta
  max-retries: 3
  retry-delay-seconds: 15
